<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geländeschnitt</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0e14;
  --surface: #13181f;
  --panel: #1a2130;
  --border: #2a3545;
  --accent: #00e5a0;
  --accent2: #0090ff;
  --warn: #ff6b35;
  --text: #e8edf4;
  --muted: #6b7a8d;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }

/* ── HEADER ── */
#header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 600;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(11,14,20,0.88);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
}

.logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.06em;
  color: var(--accent);
}
.logo span { color: var(--text); }

#header-status {
  display: flex;
  gap: 16px;
  font-size: 0.7rem;
  color: var(--muted);
  font-family: var(--font-mono);
}

.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 5px; transition: background 0.3s; }
.dot.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }

/* ── INSTRUCTION ── */
#instruction {
  position: absolute;
  top: 62px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  background: rgba(11,14,20,0.88);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 18px;
  font-size: 0.76rem;
  color: var(--text);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  backdrop-filter: blur(6px);
  pointer-events: none;
  transition: opacity 0.3s;
  white-space: nowrap;
}
#instruction.hidden { opacity: 0; }

/* ── SEARCH BOX ── */
#search-box {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  display: flex;
  gap: 6px;
  background: rgba(11,14,20,0.92);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  backdrop-filter: blur(8px);
  width: 300px;
}

#search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.76rem;
  letter-spacing: 0.03em;
}
#search-box input::placeholder { color: var(--muted); }

#btn-search {
  flex: none;
  padding: 4px 12px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
#btn-search:hover { background: #00fdb5; }

/* ── FLOATING BUTTONS ── */
#floating-btns {
  position: absolute;
  bottom: 32px;
  right: 20px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.flt-btn {
  padding: 10px 18px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 0.76rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  backdrop-filter: blur(8px);
  transition: all 0.2s;
  letter-spacing: 0.04em;
}

#btn-reset {
  background: rgba(11,14,20,0.88);
  color: var(--muted);
}
#btn-reset:hover { color: var(--text); border-color: var(--muted); }

#btn-profile {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}
#btn-profile:hover { background: #00fdb5; border-color: #00fdb5; }
#btn-profile:disabled { opacity: 0.35; cursor: not-allowed; background: var(--accent); }

/* ── MARKERS ── */
.marker-pin {
  width: 20px; height: 20px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  border: 2px solid rgba(255,255,255,0.2);
}
.marker-pin.a { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
.marker-pin.b { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }

/* ── MODAL ── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(5,8,12,0.82);
  backdrop-filter: blur(5px);
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }

#modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: min(94vw, 1100px);
  height: min(88vh, 700px);
  display: grid;
  grid-template-rows: 52px 1fr 60px;
  overflow: hidden;
  animation: modalIn 0.22s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.97) translateY(12px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

#modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#modal-header h2 {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
}

#modal-close {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 4px;
  transition: all 0.2s;
  font-family: var(--font-mono);
}
#modal-close:hover { color: var(--text); border-color: var(--border); }

#modal-chart-wrap {
  padding: 20px 28px 12px;
  position: relative;
  min-height: 0;
}

#modal-chart { width: 100% !important; height: 100% !important; }

#modal-footer {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.modal-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
  border-right: 1px solid var(--border);
}
.modal-stat:last-child { border-right: none; }

.modal-stat-label {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 2px;
  font-family: var(--font-mono);
}

.modal-stat-val {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.modal-stat-val.green { color: var(--accent); }
.modal-stat-val.blue  { color: var(--accent2); }
.modal-stat-val.warn  { color: var(--warn); }

/* ── LOADING OVERLAY ── */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1500;
  background: rgba(5,8,12,0.7);
  backdrop-filter: blur(3px);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.06em;
}
#loading.active { display: flex; }

.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Leaflet overrides */
.leaflet-control-zoom { border: 1px solid var(--border) !important; margin-top: 58px !important; }
.leaflet-control-zoom a { background: rgba(11,14,20,0.9) !important; color: var(--text) !important; border-color: var(--border) !important; }
.leaflet-control-zoom a:hover { color: var(--accent) !important; }
.leaflet-bar { box-shadow: none !important; }
</style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <div class="logo">GELÄNDE<span>SCHNITT</span></div>
  <div id="header-status">
    <span><span class="dot" id="dot-a"></span><span id="lbl-a">Punkt A: —</span></span>
    <span><span class="dot" id="dot-b"></span><span id="lbl-b">Punkt B: —</span></span>
  </div>
</div>

<div id="instruction">Klick auf die Karte → <strong>Punkt A</strong> setzen</div>

<div id="search-box">
  <input type="text" id="plz-input" placeholder="PLZ oder Ort eingeben…" maxlength="20"/>
  <button id="btn-search">→</button>
</div>

<div id="floating-btns">
  <button class="flt-btn" id="btn-reset">↺ Zurücksetzen</button>
  <button class="flt-btn" id="btn-profile" disabled>Profil berechnen</button>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <h2 id="modal-title">Geländeprofil</h2>
      <button id="modal-close">✕ Schließen</button>
    </div>
    <div id="modal-chart-wrap">
      <canvas id="modal-chart"></canvas>
    </div>
    <div id="modal-footer">
      <div class="modal-stat">
        <div class="modal-stat-label">Distanz</div>
        <div class="modal-stat-val green" id="modal-dist">—</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">Δ Höhe</div>
        <div class="modal-stat-val blue" id="modal-delta">—</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">Max. Höhe</div>
        <div class="modal-stat-val warn" id="modal-max">—</div>
      </div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <span>Höhendaten werden geladen…</span>
</div>

<script>
// ── MAP ────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([47.5, 10.5], 9);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles © Esri', maxZoom: 19
}).addTo(map);

// ── STATE ──────────────────────────────────────────────────────────────────
let pointA = null, pointB = null;
let markerA = null, markerB = null;
let polyline = null;
let chart = null;
let phase = 'A';

// ── HELPERS ────────────────────────────────────────────────────────────────
function fmt(ll) { return `${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}`; }

function haversine(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function lerp(a, b, t) { return { lat: a.lat+(b.lat-a.lat)*t, lng: a.lng+(b.lng-a.lng)*t }; }

function fmtDist(m) { return m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${Math.round(m)} m`; }

function makeIcon(cls) {
  return L.divIcon({ className:'', html:`<div class="marker-pin ${cls}"></div>`, iconSize:[20,20], iconAnchor:[10,20] });
}

// ── MAP CLICK ──────────────────────────────────────────────────────────────
map.on('click', e => {
  if (phase === 'done') return;
  if (phase === 'A') {
    pointA = e.latlng;
    if (markerA) map.removeLayer(markerA);
    markerA = L.marker(pointA, { icon: makeIcon('a') }).addTo(map);
    document.getElementById('dot-a').classList.add('active');
    document.getElementById('lbl-a').textContent = `A: ${fmt(pointA)}`;
    document.getElementById('instruction').textContent = 'Klick auf die Karte → Punkt B setzen';
    phase = 'B';
  } else if (phase === 'B') {
    pointB = e.latlng;
    if (markerB) map.removeLayer(markerB);
    markerB = L.marker(pointB, { icon: makeIcon('b') }).addTo(map);
    document.getElementById('dot-b').classList.add('active');
    document.getElementById('lbl-b').textContent = `B: ${fmt(pointB)}`;
    if (polyline) map.removeLayer(polyline);
    polyline = L.polyline([pointA, pointB], { color:'#00e5a0', weight:2, dashArray:'6 4', opacity:0.9 }).addTo(map);
    map.fitBounds(L.latLngBounds([pointA, pointB]), { padding:[80,80] });
    document.getElementById('instruction').classList.add('hidden');
    document.getElementById('btn-profile').disabled = false;
    phase = 'done';
  }
});

// ── ELEVATION APIs ─────────────────────────────────────────────────────────
async function fetchOpenMeteo(points) {
  const lats = points.map(p => p.lat.toFixed(6)).join(',');
  const lngs = points.map(p => p.lng.toFixed(6)).join(',');
  const res = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`);
  if (!res.ok) throw new Error(`Open-Meteo ${res.status}`);
  const data = await res.json();
  if (!data.elevation) throw new Error('Kein elevation-Feld');
  return data.elevation;
}

async function fetchOpenTopoChunk(points) {
  const loc = points.map(p => `${p.lat.toFixed(6)},${p.lng.toFixed(6)}`).join('|');
  const res = await fetch(`https://api.opentopodata.org/v1/srtm90m?locations=${encodeURIComponent(loc)}`);
  if (!res.ok) throw new Error(`OpenTopoData ${res.status}`);
  const data = await res.json();
  if (data.status !== 'OK') throw new Error('OpenTopoData: ' + data.status);
  return data.results.map(r => r.elevation ?? 0);
}

function chunkArr(arr, n) {
  const out = [];
  for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i+n));
  return out;
}

async function fetchElevation(points) {
  const chunks = chunkArr(points, 100);
  try {
    const r = await Promise.all(chunks.map(fetchOpenMeteo));
    return r.flat();
  } catch(e1) {
    try {
      const r = await Promise.all(chunks.map(fetchOpenTopoChunk));
      return r.flat();
    } catch(e2) {
      throw new Error('Höhendaten nicht verfügbar.');
    }
  }
}

function gaussSmooth(data, radius) {
  return data.map((_, i) => {
    let sum = 0, weight = 0;
    for (let j = -radius; j <= radius; j++) {
      const idx = Math.min(Math.max(i+j, 0), data.length-1);
      const w = Math.exp(-(j*j) / (2*radius*radius/4));
      sum += data[idx] * w; weight += w;
    }
    return sum / weight;
  });
}

// ── PROFILE ────────────────────────────────────────────────────────────────
document.getElementById('btn-profile').addEventListener('click', async () => {
  const btn = document.getElementById('btn-profile');
  btn.disabled = true;
  document.getElementById('loading').classList.add('active');

  const SAMPLES = 99;
  const dist = haversine(pointA, pointB);
  const pts = Array.from({length: SAMPLES+1}, (_, i) => lerp(pointA, pointB, i/SAMPLES));
  const distances = pts.map((_, i) => ((i/SAMPLES)*dist/1000).toFixed(4));

  try {
    const raw = await fetchElevation(pts);
    const elevations = gaussSmooth(raw, 8);

    const maxEl = Math.max(...elevations);
    const minEl = Math.min(...elevations);
    const elA = elevations[0];
    const elB = elevations[elevations.length-1];
    // Y-axis: scale relative to distance so gentle slopes look gentle
    // minSpan ensures the vertical range is never less than dist/50
    // (e.g. 180m distance → min 3.6m span shown; 1km → min 20m span)
    const actualRange = maxEl - minEl;
    const minSpan = Math.max(10, dist / 50);
    const displayRange = Math.max(actualRange, minSpan);
    const pad = displayRange * 0.15;
    const midEl = (maxEl + minEl) / 2;

    document.getElementById('modal-dist').textContent = fmtDist(dist);
    document.getElementById('modal-delta').textContent = `${elB-elA >= 0 ? '+' : ''}${Math.round(elB-elA)} m`;
    document.getElementById('modal-max').textContent = `${Math.round(maxEl)} m`;
    document.getElementById('modal-title').textContent = `Geländeprofil · ${fmtDist(dist)}`;

    document.getElementById('loading').classList.remove('active');
    document.getElementById('modal-overlay').classList.add('open');

    if (chart) chart.destroy();
    const ctx = document.getElementById('modal-chart').getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 480);
    grad.addColorStop(0, 'rgba(0,229,160,0.28)');
    grad.addColorStop(1, 'rgba(0,229,160,0.01)');

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: distances,
        datasets: [{
          data: elevations,
          borderColor: '#00e5a0',
          borderWidth: 2,
          backgroundColor: grad,
          fill: true,
          pointRadius: 0,
          tension: 0.5,
          cubicInterpolationMode: 'monotone'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 700 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#13181f',
            borderColor: '#2a3545',
            borderWidth: 1,
            titleColor: '#6b7a8d',
            bodyColor: '#e8edf4',
            titleFont: { family: 'DM Mono', size: 11 },
            bodyFont: { family: 'DM Mono', size: 13 },
            callbacks: {
              title: items => `${parseFloat(items[0].label).toFixed(3)} km`,
              label: item => `  ${Math.round(item.raw)} m ü. NN`
            }
          }
        },
        scales: {
          x: {
            ticks: { color:'#6b7a8d', font:{family:'DM Mono',size:11}, maxTicksLimit:10,
              callback: (_, i) => distances[i] ? `${parseFloat(distances[i]).toFixed(2)}km` : '' },
            grid: { color:'#1a2130' }, border: { color:'#2a3545' }
          },
          y: {
            ticks: { color:'#6b7a8d', font:{family:'DM Mono',size:11}, callback: v => `${Math.round(v)}m` },
            grid: { color:'#1a2130' }, border: { color:'#2a3545' },
            min: Math.max(0, midEl - displayRange / 2 - pad),
            max: midEl + displayRange / 2 + pad
          }
        }
      }
    });
  } catch(err) {
    document.getElementById('loading').classList.remove('active');
    alert('Fehler beim Laden der Höhendaten. Bitte erneut versuchen.');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
});

// ── MODAL CLOSE ────────────────────────────────────────────────────────────
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
});

// ── RESET ──────────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  if (markerA) { map.removeLayer(markerA); markerA = null; }
  if (markerB) { map.removeLayer(markerB); markerB = null; }
  if (polyline) { map.removeLayer(polyline); polyline = null; }
  if (chart) { chart.destroy(); chart = null; }
  pointA = pointB = null;
  phase = 'A';
  document.getElementById('dot-a').classList.remove('active');
  document.getElementById('dot-b').classList.remove('active');
  document.getElementById('lbl-a').textContent = 'Punkt A: —';
  document.getElementById('lbl-b').textContent = 'Punkt B: —';
  document.getElementById('btn-profile').disabled = true;
  const instr = document.getElementById('instruction');
  instr.textContent = 'Klick auf die Karte → Punkt A setzen';
  instr.classList.remove('hidden');
  document.getElementById('modal-overlay').classList.remove('open');
});

// ── SEARCH ─────────────────────────────────────────────────────────────────
async function searchLocation(q) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=de,at,ch&limit=1&format=json`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'de' } });
  const data = await res.json();
  if (!data.length) { alert('Ort nicht gefunden.'); return; }
  map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 14, { animate: true });
}

document.getElementById('btn-search').addEventListener('click', () => {
  const q = document.getElementById('plz-input').value.trim();
  if (q) searchLocation(q);
});
document.getElementById('plz-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const q = document.getElementById('plz-input').value.trim(); if (q) searchLocation(q); }
});
</script>
</body>
</html>
